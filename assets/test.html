<!doctype html>
<html>
<head><meta charset="utf-8"><title>Test</title></head>
<body>
<div id="root"></div>
<script type="module">
import { createRoot } from 'react-dom/client';
import { createElement } from 'react';
const root = document.getElementById('root');
createRoot(root).render(
  createElement('div', { style: { padding: 20, fontFamily: 'sans-serif' } },
    createElement('h1', null, 'TaskLoop 測試'),
    createElement('p', null, 'React 渲染正常'),
    createElement('button', { 
      onClick: () => fetch('/api/plugins/taskloop/pipelines').then(r => r.json()).then(d => {
        document.getElementById('result').textContent = JSON.stringify(d);
      }).catch(e => {
        document.getElementById('result').textContent = 'API Error: ' + e.message;
      })
    }, '測試 API'),
    createElement('pre', { id: 'result' }, '點擊按鈕測試')
  )
);
</script>
</body>
</html>
